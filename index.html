function sel(label,key,opts,req=false){return `<label class="field"><span>${label} ${req?'<b class="req">*</b>':''}</span><select onchange="form['${key}']=this.value;progress()"><option value="">Bitte wählen</option>${opts.map(o=>`<option ${form[key]===o?'selected':''}>${o}</option>`).join('')}</select></label>`}
function filename(){return "Aufmass_"+(form.kunde||"Kunde").trim().replace(/[^a-zA-Z0-9äöüÄÖÜß -]/g,"").replaceAll(" ","_")+"_Waermepumpe.pdf"}
function progress(){let rp=photoItems.filter(p=>p[2]).map(p=>p[0]);let fd=required.filter(k=>String(form[k]||'').trim()).length;let pd=rp.filter(k=>photos[k]).length;let pct=Math.round((fd+pd)/(required.length+rp.length)*100);document.getElementById("pct").textContent=pct+"%";document.getElementById("fill").style.width=pct+"%";}
function render(){title.textContent=steps[step];back.disabled=step===0;next.textContent=step===steps.length-1?"PDF speichern":"Weiter";next.className=step===steps.length-1?"done":"next";
if(step===0)content.innerHTML=`<div class="note"><b>Ablauf:</b><br>Daten ausfüllen, Fotos direkt machen, prüfen, PDF speichern.</div>`;
if(step===1)content.innerHTML=f("Kunde / Projektname","kunde","text",true)+f("Adresse Objekt","adresse","text",true)+f("Verkäufer","verkaeufer","text",true)+f("Datum","datum","date",true);
if(step===2)content.innerHTML=sel("Gebäudetyp","gebaeudetyp",["EFH","MFH","Gewerbe","Sonstiges"],true)+sel("Baujahr","baujahr",["<1950","1950-1980","1980-2000",">2000","Unklar"])+f("Wohnfläche in m²","wohnflaeche","number");
if(step===3)content.innerHTML=sel("Heizsystem Bestand","heizsystem",["Öl","Gas","Wärmepumpe","Sonstiges","Unklar"],true)+sel("Solarthermie","solarthermie",["Ja","Nein","Unklar"])+sel("Einrohr / Zweirohr","system",["Einrohr","Zweirohr","Unklar"],true)+f("Anzahl Heizkörper","anzahlHeizkoerper","number")+f("Anzahl Heizkreise FBH","anzahlFbh","number");
if(step===4)content.innerHTML=f("Abstand Fenster/Türen in cm","abstand","number",true)+f("Wandstärke in cm","wandstaerke","number",true)+sel("Wandmaterial","wandmaterial",["Ziegel","Beton","Holz","Sonstiges","Unklar"],true)+sel("Netzwerk vorhanden","netzwerk",["Ja","Nein","Unklar"])+`<label class="field"><span>Besonderheiten</span><textarea oninput="form.notizen=this.value">${form.notizen}</textarea></label>`;
if(step===5)content.innerHTML=`<div class="note">Tippen, Kamera öffnen und Foto direkt aufnehmen.</div>`+photoItems.map((p,i)=>`<div class="photo"><label><div class="cam">📷</div><div style="flex:1"><div class="ptitle">${p[1]} ${p[2]?'<b class="req">*</b>':''}</div><div class="psub">Foto ${i+1}</div></div><div>${photos[p[0]]?'✅':'⬆️'}</div><input class="hidden" type="file" accept="image/*" capture="environment" onchange="photo('${p[0]}',this.files[0])"></label>${photos[p[0]]?`<div class="thumb"><img src="${photos[p[0]]}"><span style="flex:1;font-size:12px;color:#64748b">Foto gespeichert</span><button class="remove" onclick="delete photos['${p[0]}'];render();progress()">🗑️</button></div>`:''}</div>`).join('');
if(step===6){let rp=photoItems.filter(p=>p[2]).map(p=>p[0]);let pd=rp.filter(k=>photos[k]).length;let fd=required.filter(k=>String(form[k]||'').trim()).length;let ok=pd===rp.length&&fd===required.length;content.innerHTML=`<div class="note"><b>PDF-Dateiname:</b><br>${filename()}</div><div class="grid"><div class="stat"><div class="num">${Object.keys(photos).length}</div><div>Fotos gesamt</div></div><div class="stat"><div class="num">${pd}/${rp.length}</div><div>Pflichtfotos</div></div></div><div class="note ${ok?'ok':'bad'}">${ok?'Alles vollständig.':'Noch nicht vollständig. Pflichtfelder und Pflichtfotos ergänzen.'}</div>`;}
progress();}
function photo(k,file){if(!file)return;let r=new FileReader();r.onload=()=>{photos[k]=r.result;render();progress();};r.readAsDataURL(file);}
async function pdf(){let rp=photoItems.filter(p=>p[2]).map(p=>p[0]);let ok=required.every(k=>String(form[k]||'').trim())&&rp.every(k=>photos[k]);if(!ok){alert("Bitte erst alle Pflichtfelder und Pflichtfotos ausfüllen.");return;}let {jsPDF}=window.jspdf;let doc=new jsPDF();let y=18;function head(t){doc.setTextColor(242,140,24);doc.setFont("helvetica","bold");doc.setFontSize(16);doc.text("Energie Süddeutschland",15,y);doc.setTextColor(32,33,36);doc.setFontSize(12);doc.text(t,15,y+8);doc.setDrawColor(242,140,24);doc.line(15,y+13,195,y+13);y+=24;}function row(l,v){doc.setFont("helvetica","bold");doc.setFontSize(9);doc.text(l,15,y);doc.setFont("helvetica","normal");doc.text(String(v||"-"),72,y);y+=7;}head("Aufmaß Wärmepumpe");row("Kunde",form.kunde);row("Adresse",form.adresse);row("Verkäufer",form.verkaeufer);row("Datum",form.datum);y+=4;row("Gebäudetyp",form.gebaeudetyp);row("Baujahr",form.baujahr);row("Wohnfläche",form.wohnflaeche);y+=4;row("Heizsystem",form.heizsystem);row("Solarthermie",form.solarthermie);row("System",form.system);row("Heizkörper",form.anzahlHeizkoerper);row("FBH Heizkreise",form.anzahlFbh);y+=4;row("Abstand Fenster/Türen",form.abstand+" cm");row("Wandstärke",form.wandstaerke+" cm");row("Wandmaterial",form.wandmaterial);row("Netzwerk",form.netzwerk);if(form.notizen){y+=4;doc.setFont("helvetica","bold");doc.text("Besonderheiten",15,y);y+=6;doc.setFont("helvetica","normal");doc.text(doc.splitTextToSize(form.notizen,175),15,y);}photoItems.filter(p=>photos[p[0]]).forEach((p,i)=>{doc.addPage();y=18;head("Fotodokumentation "+(i+1));doc.setFont("helvetica","bold");doc.setFontSize(11);doc.text(p[1],15,y);y+=8;try{doc.addImage(photos[p[0]],"JPEG",15,y,180,125,undefined,"FAST");}catch(e){doc.addImage(photos[p[0]],"PNG",15,y,180,125,undefined,"FAST");}});doc.save(filename());}
back.onclick=()=>{step=Math.max(0,step-1);render();};next.onclick=()=>{if(step===steps.length-1)pdf();else{step=Math.min(steps.length-1,step+1);render();}};render();
</script>
</body></html>
